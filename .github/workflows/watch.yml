name: Watch padel court

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes (UTC) — fits the private-repo free quota

  workflow_dispatch:
    inputs:
      mode:
        description: "check = normal run, test = send a test ntfy push"
        type: choice
        default: check
        options: [check, test]

# Only one run at a time so state.json commits don't race.
concurrency:
  group: watch-court
  cancel-in-progress: false

permissions:
  contents: write   # to commit state.json back to the repo

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: https://ntfy.sh
      PM_REFRESH_TOKEN: ${{ secrets.PM_REFRESH_TOKEN }}   # logged-in mode (optional)
      PM_API_KEY: ${{ secrets.PM_API_KEY }}
      TARGET_DATE: "2026-06-10"
      START_LOCAL: "06:00"
      DURATION_MIN: "90"
      COURT_PREFIXES: "01,02,03,CC,05,06"
      RENOTIFY_HOURS: "3"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tz data
        run: pip install tzdata

      # GitHub's scheduled cron only fires ~hourly on the free tier, so instead
      # of one check per trigger we loop inside the run: a check every CHECK_EVERY
      # seconds for ~LOOP_MINUTES, publishing status (and sending ntfy) each time.
      # With back-to-back hourly triggers this gives ~10-min coverage.
      - name: Watch (loop, check every 10 min)
        env:
          LOOP_MINUTES: "50"
          CHECK_EVERY: "600"
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test" ]; then
            python check_court.py --test
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( $(date +%s) + LOOP_MINUTES*60 ))
          while : ; do
            python check_court.py || true
            if ! git diff --quiet -- docs/status.json; then
              git add docs/status.json
              git commit -m "status: court availability + signal feed [skip ci]" || true
              # resilient push: rebase on concurrent commits, retry
              for i in 1 2 3; do
                if git push; then break; fi
                echo "push rejected, rebasing (attempt $i)…"
                git pull --rebase --autostash origin main || true
              done
            else
              echo "no status change"
            fi
            [ "$(date +%s)" -ge "$END" ] && break
            echo "next check in ${CHECK_EVERY}s…"
            sleep "$CHECK_EVERY"
          done
